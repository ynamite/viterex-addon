package: viterex_addon
version: '3.0.0'
license: MIT
author: Yves Torres
supportpage: https://github.com/ynamite/viterex_addon
perm: viterex[]

page:
  title: 'translate:viterex_title'
  icon: rex-icon fa-bolt
  perm: viterex[]
  subpages:
    settings:
      title: 'translate:viterex_settings'
      icon: rex-icon fa-cog
    docs:
      title: 'translate:viterex_docs'
      subPath: README.md
      icon: rex-icon fa-book
      itemclass: pull-right

requires:
  redaxo: '^5.13.0'
  php:
    version: '>=8.1'

installer_ignore:
  - node_modules
  - assets-src
  - scripts
  - .github
  - .gitignore
  - .prettierrc
  - .stylelintrc.json
  - jsconfig.json
  - package.json
  - package-lock.json
  - postcss.config.js
  - vite.config.js
  - .DS_Store
  - .editorconfig
